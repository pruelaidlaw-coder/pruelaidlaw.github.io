const pct=c=>{
  let f=0,t=0;
  t+=8;if(c.courseName)f++;if(c.courseCode)f++;if(c.faculty)f++;if(c.school)f++;if(c.nominatedModel)f++;if(c.complexity)f++;if(c.goLiveGroup)f++;if(c.overallRisk)f++;
  t+=2;if(c.execDean)f++;if(c.courseDirector)f++;
  t+=1;if(c.ccrNote)f++;
  t+=1;if(GOV_FIELDS.some(gf=>c.govFlags?.[gf.key]?.flagged&&c.govFlags[gf.key].flagged!=="No"))f++;
  SECTION_C.forEach(s=>{t+=2;const sc=c.sectionC?.[s.id]||{};if(sc.edDesignerStatus&&sc.edDesignerStatus!=="Not started")f++;if(sc.notes)f++;});
  t+=1;if(c.ocbChanges&&c.ocbChanges!=="No"||c.studentComms)f++;
  t+=1;if(c.staffingNote||c.pdRequired==="Yes")f++;
  t+=1;if(c.riskSummary)f++;
  t+=1;if(c.goLiveGroup)f++;
  return Math.round((f/t)*100);
};

const parseImportCSV=text=>{
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2)return{courses:[],skipped:0};
  const parseRow=line=>{
    const cells=[];let cur="",inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'&&!inQ){inQ=true;}
      else if(ch==='"'&&inQ&&line[i+1]==='"'){cur+='"';i++;}
      else if(ch==='"'&&inQ){inQ=false;}
      else if(ch===','&&!inQ){cells.push(cur.trim());cur="";}
      else{cur+=ch;}
    }
    cells.push(cur.trim());return cells;
  };
  const headers=parseRow(lines[0]);
  const clean=h=>h.replace(/[\r\n]+/g," ").replace(/\s+/g," ").replace(/['"]/g,"").toLowerCase().trim();
  const ch=headers.map(clean);
  const col=kws=>ch.findIndex(h=>kws.some(k=>h.includes(k.toLowerCase())));
  const iF=col(["faculty"]),iName=col(["course name"]),iCode=col(["course code"]);
  const iMode=col(["current course delivery","current mode","delivery method"]);
  const iModel=col(["nominated model"]),iComp=col(["complexity","confirm course transition"]);
  const iCampus=col(["campus for in-person","enter campus"]);
  const iG1=col(["nominate 5","group 1","go live 2027"]);
  const iCS=col(["ccr start"]),iCE=col(["ccr end"]),iScope=col(["select model"]);
  const nFac=v=>{const s=v.toLowerCase().replace(" and "," & ").trim();if(s.includes("business")||s.includes("justice")||s.includes("behavioural"))return"Faculty of Business, Justice & Behavioural Sciences";if(s.includes("arts")||s.includes("education"))return"Faculty of Arts & Education";if(s.includes("science")||s.includes("health"))return"Faculty of Science & Health";if(s.includes("agribusiness")||s.includes("commerce"))return"Faculty of Agribusiness & Commerce";return v.trim();};
  const nModel=v=>{const s=v.toLowerCase().replace(/[\r\n\s]+/g," ").trim();if(s.includes("fully online"))return"Fully Online";if(s.includes("in-person")||s.includes("in person")||s.includes("immersive"))return"In-Person Immersive";if(s.includes("combined"))return"Combined";return"";};
  const nMode=v=>{const s=v.toLowerCase().replace(/[\r\n\s]+/g," ").trim();if(s.includes("fully online")||s.includes("online"))return"Fully Online";if(s.includes("mixed"))return"Combined";if(s.includes("in-person")||s.includes("in person")||s.includes("face"))return"In-Person Immersive";return"";};
  const nComp=v=>{const s=v.replace(/[\r\n\s]+/g," ").trim().toUpperCase();if(s==="L"||s.startsWith("LOW"))return"Low";if(s==="M"||s.startsWith("MED"))return"Medium";if(s==="H"||s.startsWith("HIGH"))return"High";return"";};
  const nDate=v=>{if(!v||!v.trim())return"";const d=new Date(v.trim());return isNaN(d.getTime())?v.trim():d.toISOString().slice(0,10);};
  const courses=[];let skipped=0;
  for(let i=1;i<lines.length;i++){
    const r=parseRow(lines[i]);
    if(r.every(c=>!c.trim()))continue;
    const sv=iScope>=0?(r[iScope]||""):"";
    if(sv.toLowerCase().includes("out of scope")||sv.toLowerCase().includes("discontinued")){skipped++;continue;}
    const name=iName>=0?r[iName]||"":"",code=iCode>=0?r[iCode]||"":"";
    if(!name&&!code)continue;
    const c=emptyCourse();
    c.id=code||("imp_"+i);
    if(iF>=0)c.faculty=nFac(r[iF]||"");
    c.courseName=name;c.courseCode=code;
    if(iMode>=0)c.currentMode=nMode(r[iMode]||"");
    if(iModel>=0)c.nominatedModel=nModel(r[iModel]||"");
    if(iComp>=0)c.complexity=nComp(r[iComp]||"");
    if(iCampus>=0)c.mainCampus=r[iCampus]||"";
    if(iG1>=0)c.group1candidate=(r[iG1]||"").trim()?"Yes":"No";
    if(iCS>=0)c.ccrStart=nDate(r[iCS]||"");
    if(iCE>=0)c.ccrEnd=nDate(r[iCE]||"");
    courses.push(c);
  }
  return{courses,skipped};
};

  rows.push([]);rows.push([`"ACTIONS — all courses"`]);

    (c.marketingActions||[]).forEach(a=>{rows.push([c.courseName,c.courseCode,"Section D","Marketing & comms",a.activity,a.subject,a.responsible,a.startDate,a.endDate].map(esc).join(","));});

  });
  const blob=new Blob([rows.join("\n")],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");

// ─── IMPORT MODAL ─────────────────────────────────────────────
function ImportModal({onImport,onClose}){
  const [status,setStatus]=useState("idle");
  const [preview,setPreview]=useState(null);
  const [dragOver,setDragOver]=useState(false);
  const processFile=file=>{const reader=new FileReader();reader.onload=e=>{const {courses,skipped}=parseImportCSV(e.target.result);setPreview({courses,skipped,fileName:file.name});setStatus("preview");};reader.readAsText(file);};
  const handleDrop=e=>{e.preventDefault();setDragOver(false);const f=e.dataTransfer.files[0];if(f)processFile(f);};
  const handleFile=e=>{const f=e.target.files[0];if(f)processFile(f);};
  const confirmImport=()=>{onImport(preview.courses);setStatus("done");};
  return(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}}><div style={{background:C.white,borderRadius:8,padding:"24px",maxWidth:520,width:"100%",maxHeight:"90vh",overflowY:"auto"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}><div><div style={{fontWeight:500,fontSize:16,color:C.charcoal}}>Import from spreadsheet</div><div style={{fontSize:12,color:C.darkBrown,marginTop:2}}>Upload your Faculty Model Decision Worksheet CSV</div></div><button onClick={onClose} style={{background:"none",border:"none",fontSize:22,color:C.darkBrown,padding:"0 4px",lineHeight:1}}>×</button></div>
    {status==="idle"&&(<div><div onDrop={handleDrop} onDragOver={e=>{e.preventDefault();setDragOver(true);}} onDragLeave={()=>setDragOver(false)} style={{border:`2px dashed ${dragOver?C.orange:C.lightBrown}`,borderRadius:6,padding:"32px",textAlign:"center",background:dragOver?"#fff8f6":"#fafaf9",marginBottom:16}}><div style={{fontSize:32,marginBottom:8}}>📄</div><div style={{fontSize:14,fontWeight:500,color:C.charcoal,marginBottom:4}}>Drag and drop your CSV file here</div><div style={{fontSize:12,color:C.darkBrown,marginBottom:16}}>or click to browse</div><label style={{display:"inline-block",padding:"9px 20px",background:C.orange,color:C.white,borderRadius:4,fontSize:13,fontWeight:500,cursor:"pointer"}}>Choose file<input type="file" accept=".csv" onChange={handleFile} style={{display:"none"}}/></label></div><div style={{fontSize:12,color:C.darkBrown,background:C.pink,borderRadius:4,padding:"10px 12px"}}><strong>What gets imported:</strong> Course name, code, faculty, current mode, nominated model, complexity, main campus, Group 1 candidacy, CCR dates. Out of scope / discontinued courses are automatically excluded.</div></div>)}
    {status==="preview"&&preview&&(<div><div style={{background:"#f0fdf4",border:"1px solid #4ade80",borderRadius:4,padding:"12px 14px",marginBottom:16,fontSize:13}}><div style={{fontWeight:500,color:"#14532d",marginBottom:4}}>Ready to import from {preview.fileName}</div><div style={{color:"#166534"}}><span style={{marginRight:16}}>✓ {preview.courses.length} courses found</span>{preview.skipped>0&&<span style={{color:"#78350f"}}>⊘ {preview.skipped} out-of-scope excluded</span>}</div></div><div style={{border:`1px solid ${C.lightBrown}`,borderRadius:4,overflow:"hidden",marginBottom:16,maxHeight:240,overflowY:"auto"}}><table style={{width:"100%",fontSize:12,borderCollapse:"collapse"}}><thead style={{position:"sticky",top:0}}><tr style={{background:C.pink}}>{["Course name","Code","Faculty","Model","Complexity"].map(h=>(<th key={h} style={{padding:"6px 10px",textAlign:"left",fontWeight:500,color:C.darkBrown,borderBottom:`1px solid ${C.lightBrown}`}}>{h}</th>))}</tr></thead><tbody>{preview.courses.map((c,i)=>(<tr key={i} style={{borderBottom:`1px solid ${C.pink}`,background:i%2===0?C.white:"#fdfcfb"}}><td style={{padding:"5px 10px"}}>{c.courseName}</td><td style={{padding:"5px 10px",color:C.darkBrown}}>{c.courseCode}</td><td style={{padding:"5px 10px",fontSize:11}}>{c.faculty?.split(" ").slice(-1)[0]||"—"}</td><td style={{padding:"5px 10px"}}>{c.nominatedModel||<span style={{color:C.lightBrown}}>—</span>}</td><td style={{padding:"5px 10px"}}>{c.complexity||<span style={{color:C.lightBrown}}>—</span>}</td></tr>))}</tbody></table></div><div style={{background:"#fffbeb",border:"1px solid #fbbf24",borderRadius:4,padding:"10px 12px",marginBottom:16,fontSize:12,color:"#78350f"}}>Courses already in the register (matched by course code) will be updated. New courses will be added. Manually entered data is preserved.</div><div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><button onClick={()=>setStatus("idle")} style={{padding:"9px 18px",background:C.white,border:`1px solid ${C.lightBrown}`,borderRadius:4,fontSize:13,color:C.charcoal}}>Back</button><button onClick={confirmImport} style={{padding:"9px 18px",background:C.orange,border:"none",borderRadius:4,fontSize:13,fontWeight:500,color:C.white}}>Import {preview.courses.length} courses</button></div></div>)}
    {status==="done"&&(<div style={{textAlign:"center",padding:"16px 0"}}><div style={{fontSize:40,marginBottom:12}}>✓</div><div style={{fontWeight:500,fontSize:16,color:C.darkGreen,marginBottom:6}}>Import complete</div><div style={{fontSize:13,color:C.darkBrown,marginBottom:20}}>{preview.courses.length} courses imported successfully.</div><button onClick={onClose} style={{padding:"10px 24px",background:C.orange,border:"none",borderRadius:4,fontSize:13,fontWeight:500,color:C.white}}>Done</button></div>)}
  </div></div>);
}

// ─── SECTION H — OPERATIONALISE ──────────────────────────────
function SecH(){
  const [openPanel,setOpenPanel]=useState(null);
  const toggle=k=>setOpenPanel(p=>p===k?null:k);

  const Panel=({id,title,tag,tagBg,tagCol,children})=>{
    const open=openPanel===id;
    return(
      <div style={{border:`1px solid ${C.lightBrown}`,borderLeft:`3px solid ${tagBg}`,borderRadius:4,marginBottom:10,overflow:"hidden"}}>
        <div onClick={()=>toggle(id)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",cursor:"pointer",background:open?C.pink:"#fdfcfb",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:10,minWidth:0}}>
            <span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:3,background:tagBg,color:tagCol,flexShrink:0,letterSpacing:"0.04em"}}>{tag}</span>
            <span style={{fontSize:14,fontWeight:500,color:C.charcoal}}>{title}</span>
          </div>
          <span style={{fontSize:12,color:C.darkBrown,flexShrink:0}}>{open?"▲":"▼"}</span>
        </div>
        {open&&<div style={{padding:"16px 14px",borderTop:`1px solid ${C.lightBrown}`}}>{children}</div>}
      </div>
    );
  };

  const Row=({label,children})=>(
    <div style={{display:"flex",flexWrap:"wrap",gap:8,padding:"9px 0",borderBottom:`1px solid ${C.pink}`,fontSize:13,alignItems:"flex-start"}}>
      <span style={{color:C.darkBrown,minWidth:160,flexShrink:0,fontWeight:500,fontSize:12,paddingTop:1}}>{label}</span>
      <span style={{color:C.charcoal,flex:1,lineHeight:1.6}}>{children}</span>
    </div>
  );

  const Pill=({label,color})=>{
    const styles={
      green:{bg:"#f0fdf4",col:"#14532d",br:"#4ade80"},
      amber:{bg:"#fffbeb",col:"#78350f",br:"#fbbf24"},
      blue:{bg:"#eff6ff",col:"#1e3a8a",br:"#93c5fd"},
      red:{bg:"#fff3e0",col:"#7c2d12",br:"#fb923c"},
    };
    const s=styles[color]||styles.blue;
    return <span style={{fontSize:11,fontWeight:500,padding:"2px 8px",borderRadius:4,background:s.bg,color:s.col,border:`1px solid ${s.br}`,whiteSpace:"nowrap"}}>{label}</span>;
  };

  const Note=({children,color="amber"})=>{
    const bg=color==="green"?"#f0fdf4":color==="blue"?"#eff6ff":"#fffbeb";
    const border=color==="green"?"#4ade80":color==="blue"?"#93c5fd":"#fbbf24";
    const col=color==="green"?"#14532d":color==="blue"?"#1e3a8a":"#78350f";
    return <div style={{background:bg,border:`1px solid ${border}`,borderRadius:4,padding:"10px 12px",fontSize:12,color:col,lineHeight:1.65,marginTop:10}}>{children}</div>;
  };

  return(
    <div>
      <SecHdr>Section H — Operationalising this tool</SecHdr>
      <div style={{background:C.pink,borderRadius:4,padding:"12px 14px",marginBottom:18,fontSize:13,color:C.darkBrown,lineHeight:1.65}}>
        This tab is a <strong>read-only reference</strong> for the project team. It documents what would need to be in place to move this tool from a personal prototype to a supported institutional system — covering where data lives, where the tool is hosted, and how access is controlled.
      </div>

      {/* BACKEND & DATA STORAGE */}
      <div style={{fontWeight:500,fontSize:12,color:C.darkBrown,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:10,marginTop:4}}>1 — Backend &amp; data storage</div>

      <div style={{background:"#fdfcfb",border:`1px solid ${C.lightBrown}`,borderRadius:4,padding:"12px 14px",marginBottom:10,fontSize:13,color:C.charcoal,lineHeight:1.65}}>
        <strong>Current state:</strong> All data is stored in <code style={{background:C.pink,padding:"1px 5px",borderRadius:3,fontSize:12}}>localStorage</code> in the user's browser. This means data is isolated per device, invisible to anyone else, and lost if the browser cache is cleared. For a shared institutional planning tool, data needs to live somewhere central.
      </div>

      <Panel id="b1" title="Google Sheets via Apps Script" tag="SIMPLEST" tagBg="#3c8364" tagCol="#fff">
        <Row label="What it is">A free Google Apps Script deployed as a web app acts as a middleman. When a course is saved in the tool, it sends the data to the script, which writes a row into a Google Sheet.</Row>
        <Row label="Setup effort"><Pill label="Low" color="green"/> No server required. Takes roughly 2–3 hours to configure end-to-end.</Row>
        <Row label="Who sees data">Anyone with access to the Google Sheet. You control sharing permissions within Google Drive.</Row>
        <Row label="Limitations">Not designed for complex nested data — the action tables and section C detail would need to be flattened into columns. Not ideal for concurrent multi-user editing. Data is held in Google's infrastructure, not CSU's.</Row>
        <Row label="Best for">Early prototype validation with a small team. Quick to get running without IT involvement.</Row>
        <Note color="amber">Google infrastructure sits outside CSU's Microsoft tenancy. Check with your IT team whether storing planning data in Google Workspace is acceptable under CSU's data governance policy.</Note>
      </Panel>

      <Panel id="b2" title="Airtable" tag="EASY API" tagBg="#5675bc" tagCol="#fff">
        <Row label="What it is">Airtable is a cloud database with a clean REST API. Each course becomes a record. The tool posts data to Airtable on save. Data is visible and editable in Airtable's own interface as well as through the tool.</Row>
        <Row label="Setup effort"><Pill label="Low–Medium" color="blue"/> Free tier available. API integration takes roughly 4–6 hours.</Row>
        <Row label="Who sees data">Anyone added to the Airtable base. Granular field-level permissions available on paid plans.</Row>
        <Row label="Limitations">Free tier has record and attachment limits. Airtable is a third-party US-hosted service — data sovereignty considerations apply. Not within CSU's Microsoft ecosystem.</Row>
        <Row label="Best for">Prototypes where the team wants a nice visual interface for viewing and editing data alongside the tool.</Row>
        <Note color="amber">As with Google, confirm with IT that storing course planning data in a third-party US cloud service is compliant with CSU's data classification requirements.</Note>
      </Panel>

      <Panel id="b3" title="SharePoint List (Microsoft 365)" tag="RECOMMENDED FOR CSU" tagBg="#07342d" tagCol="#fff">
        <Row label="What it is">A SharePoint List in CSU's Microsoft 365 tenancy acts as the database. The tool uses the Microsoft Graph API to read and write course records. Data stays within CSU's own Microsoft environment.</Row>
        <Row label="Setup effort"><Pill label="Medium" color="amber"/> Requires a CSU Azure App Registration to generate API credentials. Estimated 1–2 days of technical setup, likely requiring DIT involvement.</Row>
        <Row label="Who sees data">Controlled via SharePoint permissions — individuals, groups, or the whole tenancy. Integrates with CSU's existing Active Directory groups.</Row>
        <Row label="Limitations">Graph API has a learning curve. Nested data structures (action tables, section C) require careful schema design in the List columns. Complex queries can be slow at scale.</Row>
        <Row label="Best for">Any deployment beyond a small prototype. Data stays in CSU's tenancy, IT governance is straightforward, and SSO authentication is built in.</Row>
        <Note color="green">This is the most institutionally appropriate option. It keeps data inside CSU's Microsoft 365 environment, aligns with existing IT governance, and enables SSO without additional infrastructure.</Note>
      </Panel>

      <Panel id="b4" title="Supabase or Firebase (full database)" tag="MOST SCALABLE" tagBg="#222944" tagCol="#fff">
        <Row label="What it is">A proper hosted database (PostgreSQL via Supabase, or Firestore via Firebase). Full relational data model, real-time sync, multi-user support, and role-based access control built in.</Row>
        <Row label="Setup effort"><Pill label="High" color="red"/> Requires a developer. Estimated 3–5 days of setup. Ongoing infrastructure management required.</Row>
        <Row label="Who sees data">Fully configurable via row-level security policies. Can be as open or locked down as needed.</Row>
        <Row label="Limitations">Overkill for a prototype. Requires ongoing technical maintenance. Third-party infrastructure unless self-hosted.</Row>
        <Row label="Best for">If this tool becomes a sustained institutional system with many concurrent users and complex access control requirements.</Row>
      </Panel>

      {/* HOSTING */}
      <div style={{fontWeight:500,fontSize:12,color:C.darkBrown,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:10,marginTop:22}}>2 — Hosting options</div>

      <div style={{background:"#fdfcfb",border:`1px solid ${C.lightBrown}`,borderRadius:4,padding:"12px 14px",marginBottom:10,fontSize:13,color:C.charcoal,lineHeight:1.65}}>
        <strong>Current state:</strong> The tool is a single HTML file hosted on a personal website. This is fine for a prototype but has no access control, no institutional branding governance, and no IT support pathway.
      </div>

      <Panel id="h1" title="Static web host (Netlify / GitHub Pages)" tag="CURRENT APPROACH" tagBg="#5675bc" tagCol="#fff">
        <Row label="What it is">The HTML file is deployed to a free static hosting service. Anyone with the URL can access it.</Row>
        <Row label="Effort">Near zero. Drag-and-drop deployment in minutes.</Row>
        <Row label="Authentication">None built in. URL is public unless the hosting provider's password protection is enabled (paid feature on Netlify).</Row>
        <Row label="Suitable for">Prototype sharing with a small trusted group via a private URL. Not suitable for broader staff rollout.</Row>
        <Note color="amber">No authentication means anyone who finds the URL can view and edit data. Fine for a prototype — not appropriate for institutional deployment.</Note>
      </Panel>

      <Panel id="h2" title="SharePoint page (embedded)" tag="RECOMMENDED FOR CSU" tagBg="#07342d" tagCol="#fff">
        <Row label="What it is">The tool is embedded into a SharePoint page as a web part or iframe, living within CSU's intranet. Staff access it through SharePoint with their existing CSU login.</Row>
        <Row label="Effort"><Pill label="Medium" color="amber"/> Requires converting the React app to work within SharePoint's environment, or using SharePoint Framework (SPFx). DIT involvement likely needed.</Row>
        <Row label="Authentication">Automatic — CSU SSO via Microsoft Entra ID. No separate login required for staff.</Row>
        <Row label="Suitable for">Institutional deployment. Data stays in Microsoft 365, access is controlled by SharePoint permissions, and the tool sits alongside other DLT resources.</Row>
        <Note color="green">Embedding in SharePoint is the natural institutional home for this tool. It removes the need for separate authentication infrastructure and keeps everything within CSU's existing Microsoft ecosystem.</Note>
      </Panel>

      <Panel id="h3" title="CSU-managed web server or Azure Static Web App" tag="IT-MANAGED" tagBg="#222944" tagCol="#fff">
        <Row label="What it is">DIT hosts the tool on CSU's own web infrastructure or deploys it as an Azure Static Web App within CSU's Azure tenancy. The URL becomes a csu.edu.au address.</Row>
        <Row label="Effort"><Pill label="High" color="red"/> Requires a formal IT request, security review, and ongoing infrastructure management by DIT.</Row>
        <Row label="Authentication">Can be configured with CSU SSO via Microsoft Entra ID. Role-based access can be enforced at the server level.</Row>
        <Row label="Suitable for">Production deployment at scale. Full institutional ownership. Appropriate if the tool becomes a formally supported DLT system.</Row>
      </Panel>

      {/* AUTHENTICATION */}
      <div style={{fontWeight:500,fontSize:12,color:C.darkBrown,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:10,marginTop:22}}>3 — Authentication &amp; access control</div>

      <div style={{background:"#fdfcfb",border:`1px solid ${C.lightBrown}`,borderRadius:4,padding:"12px 14px",marginBottom:10,fontSize:13,color:C.charcoal,lineHeight:1.65}}>
        <strong>Current state:</strong> No authentication. Anyone with the URL can view and edit all courses. For institutional use, access needs to be controlled so that Course Directors only see their own courses, DLT managers see across faculties, and Executive Deans see their portfolio.
      </div>

      <Panel id="a1" title="No authentication (current)" tag="PROTOTYPE ONLY" tagBg="#71634e" tagCol="#fff">
        <Row label="What it is">The tool is open to anyone with the URL. All data is visible and editable by all visitors.</Row>
        <Row label="Risk"><Pill label="High" color="red"/> Any visitor can edit or delete any course record. Not suitable beyond a small trusted group.</Row>
        <Row label="Suitable for">Solo use or prototype demonstration only.</Row>
      </Panel>

      <Panel id="a2" title="Microsoft Entra ID (CSU SSO)" tag="RECOMMENDED FOR CSU" tagBg="#07342d" tagCol="#fff">
        <Row label="What it is">CSU's existing single sign-on system (Microsoft Entra ID, formerly Azure AD). Staff log in with their CSU credentials. The tool verifies their identity before granting access.</Row>
        <Row label="Setup effort"><Pill label="Medium" color="amber"/> Requires an Azure App Registration and OAuth 2.0 integration in the tool's code. DIT involvement required. Once configured, login is seamless for all CSU staff.</Row>
        <Row label="What it enables">Know who is accessing the tool. Restrict access to CSU staff only. Build role-based access rules (e.g. Course Director can only edit their own courses; DLT manager can see all).</Row>
        <Row label="Role model suggestion">
          <div style={{marginTop:4}}>
            {[["Course Director","Can edit their own courses only"],["DLT Contact","Can view and comment on assigned courses"],["Head of School","Can view all courses in their school"],["Executive Dean / AD Academic","Can view all courses in their faculty"],["DLT Manager / Admin","Full read/write access across all courses"]].map(([role,desc],i)=>(

                <span style={{fontSize:12,fontWeight:500,color:C.charcoal,minWidth:180,flexShrink:0}}>{role}</span>
                <span style={{fontSize:12,color:C.darkBrown}}>{desc}</span>
              </div>
            ))}
          </div>
        </Row>
        <Note color="green">CSU already has Microsoft Entra ID infrastructure in place. This is the lowest-friction authentication path for an institutional deployment — staff don't need new accounts or passwords.</Note>
      </Panel>

      <Panel id="a3" title="Simple password protection" tag="LIGHTWEIGHT OPTION" tagBg="#5675bc" tagCol="#fff">
        <Row label="What it is">A shared password gates access to the tool. No individual identity is verified — anyone with the password can access everything.</Row>
        <Row label="Setup effort"><Pill label="Very low" color="green"/> Can be implemented in the HTML file itself or via Netlify's password protection feature (paid).</Row>
        <Row label="Limitations">Shared passwords get shared. No audit trail. No role-based access. Not scalable beyond a very small team.</Row>
        <Row label="Suitable for">Keeping a prototype off public view without full SSO setup. Bridge measure only.</Row>
      </Panel>

      {/* SUMMARY */}
      <div style={{marginTop:24,background:C.charcoal,borderRadius:4,padding:"14px 16px"}}>
        <div style={{fontSize:11,fontWeight:500,color:C.lightBrown,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:10}}>Recommended path for CSU institutional deployment</div>
        {[
          ["Backend","SharePoint List via Microsoft Graph API — data stays in CSU's Microsoft 365 tenancy"],
          ["Hosting","Embedded in a SharePoint page, or Azure Static Web App under csu.edu.au"],
          ["Authentication","Microsoft Entra ID (SSO) — staff log in with existing CSU credentials"],
          ["First step","Raise a project brief with DIT to register an Azure App and provision a SharePoint List — this unlocks all three of the above"],
        ].map(([label,desc],i)=>(
          <div key={i} style={{display:"flex",gap:10,padding:"7px 0",borderBottom:`1px solid rgba(255,255,255,0.08)`,alignItems:"flex-start"}}>
            <span style={{fontSize:11,fontWeight:700,color:C.orange,minWidth:120,flexShrink:0,paddingTop:1,textTransform:"uppercase",letterSpacing:"0.03em"}}>{label}</span>
            <span style={{fontSize:13,color:"rgba(255,255,255,0.85)",lineHeight:1.6}}>{desc}</span>
          </div>
        ))}
      </div>

    </div>
  );
}

// ─── OPERATIONALISE MODAL ────────────────────────────────────
function OpModal({onClose}){
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:100,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"1rem",overflowY:"auto"}}>
      <div style={{background:C.white,borderRadius:8,width:"100%",maxWidth:720,marginTop:8,marginBottom:8}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 20px",borderBottom:`1px solid ${C.lightBrown}`,position:"sticky",top:0,background:C.white,zIndex:1,borderRadius:"8px 8px 0 0"}}>
          <div><div style={{fontWeight:500,fontSize:16,color:C.charcoal}}>Operationalising this tool</div><div style={{fontSize:12,color:C.darkBrown,marginTop:2}}>Backend, hosting &amp; access control — reference for the project team</div></div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,color:C.darkBrown,padding:"0 4px",lineHeight:1,cursor:"pointer"}}>×</button>
        </div>
        <div style={{padding:"20px"}}><SecH/></div>
      </div>
    </div>
  );
}

// ─── FORM VIEW ────────────────────────────────────────────────
const TABS=["A — Course details","B — Governance","C — Model gap","D — Marketing","E — Staff","F — Risks","G — Final"];
function FormView({course,upd,updGov,updC,activeTab,setActiveTab,onSave,onCancel,onDelete,onScope,saved}){
  return(<div><div style={{background:C.charcoal,padding:"0 1rem",position:"sticky",top:0,zIndex:10}}><div style={{maxWidth:900,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",height:56,gap:8}}><div style={{display:"flex",alignItems:"center",gap:8,minWidth:0}}><Crest size={26}/><button onClick={onCancel} style={{background:"transparent",border:"1px solid rgba(255,255,255,0.3)",color:C.white,padding:"6px 10px",borderRadius:4,fontSize:12,whiteSpace:"nowrap",minHeight:36}}>← Back</button><span style={{color:C.white,fontSize:13,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} className="hide-mobile">{course.courseName||"New course"}</span></div><div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>{saved&&<span style={{color:C.lightGreen,fontSize:12,fontWeight:500,whiteSpace:"nowrap"}}>✓ Saved</span>}<button onClick={onScope} style={{background:"transparent",border:"1px solid rgba(255,255,255,0.3)",color:C.white,padding:"6px 10px",borderRadius:4,fontSize:12,whiteSpace:"nowrap",minHeight:36}} className="hide-mobile">Scope doc</button><button onClick={onDelete} style={{background:"transparent",border:"1px solid #ef4444",color:"#ef4444",padding:"6px 10px",borderRadius:4,fontSize:12,minHeight:36}} className="hide-mobile">Delete</button><button onClick={onSave} style={{background:C.orange,border:"none",color:C.white,padding:"6px 14px",borderRadius:4,fontSize:13,fontWeight:500,minHeight:36}}>Save</button></div></div></div>
  <div style={{background:C.orange,padding:"8px 1rem"}}><div style={{maxWidth:900,margin:"0 auto"}}><p style={{color:"rgba(255,255,255,0.9)",fontSize:12}}>{course.courseName||"New course"} — Course Transition Plan</p></div></div>
  <div style={{maxWidth:900,margin:"0 auto",padding:"1rem"}}><div style={{overflowX:"auto",marginBottom:16,borderBottom:`2px solid ${C.orange}`}}><div style={{display:"flex",gap:0,whiteSpace:"nowrap"}}>{TABS.map((t,i)=>(<button key={i} onClick={()=>setActiveTab(i)} style={{background:activeTab===i?C.orange:"transparent",border:"none",borderRadius:"4px 4px 0 0",padding:"10px 12px",fontSize:12,cursor:"pointer",color:activeTab===i?C.white:C.darkBrown,fontWeight:activeTab===i?500:400,minHeight:40}}>{t}</button>))}</div></div>
  <div style={{background:C.white,border:`1px solid ${C.lightBrown}`,borderRadius:4,padding:"1rem"}}>{activeTab===0&&<SecA c={course} u={upd}/>}{activeTab===1&&<SecB c={course} u={upd} ug={updGov}/>}{activeTab===2&&<SecC c={course} uc={updC}/>}{activeTab===3&&<SecD c={course} u={upd}/>}{activeTab===4&&<SecE c={course} u={upd}/>}{activeTab===5&&<SecF c={course} u={upd}/>}{activeTab===6&&<SecG c={course} u={upd}/>}</div>
  <div style={{display:"flex",justifyContent:"space-between",gap:8,marginTop:16,flexWrap:"wrap"}}><button onClick={onDelete} style={{padding:"10px 16px",background:"transparent",border:"1px solid #ef4444",borderRadius:4,fontSize:13,color:"#ef4444",minHeight:44}} className="hide-mobile">Delete course</button><div style={{display:"flex",gap:8,marginLeft:"auto"}}><button onClick={onCancel} style={{padding:"10px 18px",background:C.white,border:`1px solid ${C.lightBrown}`,borderRadius:4,fontSize:13,color:C.charcoal,minHeight:44}}>Cancel</button><button onClick={onSave} style={{padding:"10px 20px",background:C.orange,border:"none",borderRadius:4,fontSize:13,fontWeight:500,color:C.white,minHeight:44}}>Save course</button></div></div></div></div>);
}

// ─── COURSE CARD (mobile) ─────────────────────────────────────
function CourseCard({c,onEdit,onScope}){
  const p=pct(c),rs=riskSty(c.overallRisk);
  return(<div style={{background:C.white,border:`1px solid ${C.lightBrown}`,borderRadius:6,padding:"14px 16px",marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8,gap:8}}><div style={{minWidth:0}}><div style={{fontWeight:500,fontSize:15,marginBottom:2}}>{c.courseName||<span style={{color:C.lightBrown}}>Unnamed course</span>}</div><div style={{fontSize:12,color:C.darkBrown}}>{c.courseCode}{c.courseCode&&c.faculty?" · ":""}{c.faculty?.split(" ").slice(-1)[0]||""}</div></div>{c.overallRisk&&<Badge label={c.overallRisk} bg={rs.bg} col={rs.col} br={rs.br}/>}</div><div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10,fontSize:12,color:C.darkBrown}}>{c.nominatedModel&&<span style={{background:C.pink,padding:"2px 8px",borderRadius:3}}>{c.nominatedModel}</span>}{c.goLiveGroup&&<span style={{background:C.pink,padding:"2px 8px",borderRadius:3}}>{c.goLiveGroup.replace(" — "," ")}</span>}{c.complexity&&<span style={{background:C.pink,padding:"2px 8px",borderRadius:3}}>{c.complexity} complexity</span>}</div><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}><div style={{flex:1,height:6,background:C.pink,borderRadius:3}}><div style={{width:`${p}%`,height:"100%",background:p>=80?C.lightGreen:p>=40?C.orange:C.lightBrown,borderRadius:3}}/></div><span style={{fontSize:11,color:C.darkBrown,minWidth:32}}>{p}% complete</span></div><div style={{display:"flex",gap:8}}><button onClick={onEdit} style={{flex:1,padding:"9px",background:C.white,border:`1px solid ${C.orange}`,color:C.orange,borderRadius:4,fontSize:13,fontWeight:500,minHeight:40}}>Edit</button><button onClick={onScope} style={{flex:1,padding:"9px",background:C.white,border:`1px solid ${C.darkGreen}`,color:C.darkGreen,borderRadius:4,fontSize:13,fontWeight:500,minHeight:40}}>Scope doc</button></div></div>);
}

// ─── DASHBOARD ────────────────────────────────────────────────
function App(){
  const [courses,setCourses]=useState(()=>loadCourses()||makeSample());
  const [view,setView]=useState("dashboard");
  const [active,setActive]=useState(null);
  const [tab,setTab]=useState(0);
  const [saved,setSaved]=useState(false);
  const [showImport,setShowImport]=useState(false);
  const [showOp,setShowOp]=useState(false);
  const [activeFilter,setActiveFilter]=useState(null);
  const [w,setW]=useState(window.innerWidth);

  useEffect(()=>{const h=()=>setW(window.innerWidth);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);
  useEffect(()=>{saveCourses(courses);},[courses]);

  const mobile=w<641;
  const FILTERS={
    all:{label:"All courses",fn:()=>true},
    g1:{label:"Group 1 — 2027",fn:c=>c.goLiveGroup?.includes("2027")},
    g2:{label:"Group 2 — 2028",fn:c=>c.goLiveGroup?.includes("2028")},
    g3:{label:"Group 3 — 2029",fn:c=>c.goLiveGroup?.includes("2029")},
    risk:{label:"High / critical risk",fn:c=>c.overallRisk==="High"||c.overallRisk==="Critical"},
  };
  const cf=activeFilter||"all";
  const filtered=courses.filter(FILTERS[cf].fn);
  const metrics=[
    {key:"all",label:"Total courses",value:courses.length,accent:C.darkGreen},
    {key:"g1",label:"Group 1 (2027)",value:courses.filter(FILTERS.g1.fn).length,accent:C.lightGreen},
    {key:"g2",label:"Group 2 (2028)",value:courses.filter(FILTERS.g2.fn).length,accent:C.lightBlue},
    {key:"g3",label:"Group 3 (2029)",value:courses.filter(FILTERS.g3.fn).length,accent:C.darkBlue},
    {key:"risk",label:"High/critical risk",value:courses.filter(FILTERS.risk.fn).length,accent:C.orange},
  ];

  const handleImport=imported=>{
    setCourses(existing=>{
      const merged=[...existing];
      imported.forEach(ic=>{const idx=merged.findIndex(e=>e.courseCode&&e.courseCode===ic.courseCode);if(idx>=0){merged[idx]={...merged[idx],faculty:ic.faculty||merged[idx].faculty,courseName:ic.courseName||merged[idx].courseName,courseCode:ic.courseCode||merged[idx].courseCode,currentMode:ic.currentMode||merged[idx].currentMode,nominatedModel:ic.nominatedModel||merged[idx].nominatedModel,complexity:ic.complexity||merged[idx].complexity,mainCampus:ic.mainCampus||merged[idx].mainCampus,group1candidate:ic.group1candidate||merged[idx].group1candidate,ccrStart:ic.ccrStart||merged[idx].ccrStart,ccrEnd:ic.ccrEnd||merged[idx].ccrEnd};}else{merged.push(ic);}});
      return merged;
    });
    setSaved(true);setTimeout(()=>setSaved(false),2500);
  };

  const openForm=c=>{setActive({...c});setView("form");setTab(0);};
  const openScope=c=>{setActive({...c});setView("scope");};
  const newCourse=()=>{const c=emptyCourse();setActive(c);setView("form");setTab(0);};
  const SHEETS_URL='https://script.google.com/macros/s/AKfycbzYBr1dAXxlpqeAsEEoPExnmYNIjkjwneh5jmNuJexy8vZ6UWv7Pepx_TsLI7YFMIEbig/exec';
  const save=()=>{setCourses(p=>{const idx=p.findIndex(c=>c.id===active.id);return idx>=0?p.map(c=>c.id===active.id?active:c):[...p,active];});setSaved(true);setTimeout(()=>setSaved(false),2500);fetch(SHEETS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({course:active})}).catch(err=>console.warn('Sheets sync failed:',err));setView("dashboard");};
  const del=id=>{setCourses(p=>p.filter(c=>c.id!==id));setView("dashboard");};
  const upd=(k,v)=>setActive(p=>({...p,[k]:v}));
  const updGov=(k,sk,v)=>setActive(p=>({...p,govFlags:{...p.govFlags,[k]:{...(p.govFlags?.[k]||{}),[sk]:v}}}));
  const updC=(id,k,v)=>setActive(p=>({...p,sectionC:{...p.sectionC,[id]:{...(p.sectionC?.[id]||{}),[k]:v}}}));

  if(view==="form"&&active)return <FormView course={active} upd={upd} updGov={updGov} updC={updC} activeTab={tab} setActiveTab={setTab} onSave={save} onCancel={()=>setView("dashboard")} onDelete={()=>del(active.id)} onScope={()=>openScope(active)} saved={saved}/>;
  if(view==="scope"&&active)return <ScopeView course={active} onBack={()=>setView("dashboard")} onEdit={()=>openForm(active)}/>;

  return(<div>
    {showImport&&<ImportModal onImport={handleImport} onClose={()=>setShowImport(false)}/>}
    {showOp&&<OpModal onClose={()=>setShowOp(false)}/>}
    <div style={{background:C.charcoal,padding:"0 1rem",position:"sticky",top:0,zIndex:10}}><div style={{maxWidth:1100,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",height:56,gap:8}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}><Crest size={30}/><div className="hide-mobile"><div style={{color:C.white,fontWeight:500,fontSize:14,lineHeight:1.2}}>Charles Sturt University</div><div style={{color:C.lightBrown,fontSize:11}}>Division of Learning and Teaching</div></div></div>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        {saved&&<span style={{color:C.lightGreen,fontSize:12,fontWeight:500,whiteSpace:"nowrap"}}>✓ Saved</span>}
        <button onClick={()=>setShowOp(true)} style={{background:"transparent",border:`1px solid ${C.lightBrown}`,color:C.lightBrown,padding:"7px 12px",borderRadius:4,fontSize:12,fontWeight:500,minHeight:38}} className="hide-mobile">Operationalise</button>
        <button onClick={()=>setShowImport(true)} style={{background:"transparent",border:`1px solid ${C.lightBlue}`,color:C.lightBlue,padding:"7px 12px",borderRadius:4,fontSize:12,fontWeight:500,minHeight:38}} className="hide-mobile">Import</button>
        <button onClick={()=>exportCSV(courses)} style={{background:"transparent",border:`1px solid ${C.lightGreen}`,color:C.lightGreen,padding:"7px 12px",borderRadius:4,fontSize:12,fontWeight:500,minHeight:38}} className="hide-mobile">Export CSV</button>
        <button onClick={()=>{if(window.confirm("Reset to sample data? This will clear all current data.")){localStorage.removeItem(STORAGE_KEY);setCourses(makeSample());}}} style={{background:"transparent",border:`1px solid ${C.lightBrown}`,color:C.lightBrown,padding:"7px 12px",borderRadius:4,fontSize:12,fontWeight:500,minHeight:38}} className="hide-mobile">Reset</button>
        <button onClick={newCourse} style={{background:C.orange,border:"none",color:C.white,padding:"7px 14px",borderRadius:4,fontSize:13,fontWeight:500,minHeight:38}}>+ New course</button>
      </div>
    </div></div>

    <div style={{background:C.orange,padding:"12px 1rem"}}><div style={{maxWidth:1100,margin:"0 auto"}}><h1 style={{color:C.white,fontSize:mobile?17:20,fontWeight:400,margin:0}}>MEA Course Transition Plan</h1><p style={{color:"rgba(255,255,255,0.85)",fontSize:12,margin:"2px 0 0"}}>Models of Engagement and Assessment — 2026–2029</p></div></div>

    <div style={{maxWidth:1100,margin:"0 auto",padding:"1rem"}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(100px,1fr))",gap:8,marginBottom:16}}>
        {metrics.map(m=>{const isA=cf===m.key;return(<button key={m.key} onClick={()=>setActiveFilter(isA?null:m.key)} style={{background:isA?m.accent:C.white,border:`1px solid ${isA?m.accent:C.lightBrown}`,borderTop:`3px solid ${m.accent}`,borderRadius:4,padding:"10px 12px",textAlign:"left",cursor:"pointer",transition:"all 0.15s",boxShadow:isA?"0 2px 8px rgba(0,0,0,0.15)":"none"}}><div style={{fontSize:10,color:isA?"rgba(255,255,255,0.85)":C.darkBrown,marginBottom:4,textTransform:"uppercase",letterSpacing:"0.04em",fontWeight:500,lineHeight:1.3}}>{m.label}</div><div style={{fontSize:22,fontWeight:500,color:isA?C.white:C.charcoal}}>{m.value}</div></button>);})}
      </div>

      {cf!=="all"&&(<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:C.pink,borderRadius:4,padding:"8px 14px",marginBottom:12,fontSize:13}}><span style={{color:C.darkBrown}}>Showing: <strong>{FILTERS[cf].label}</strong> — {filtered.length} course{filtered.length!==1?"s":""}</span><button onClick={()=>setActiveFilter(null)} style={{background:"none",border:`1px solid ${C.darkBrown}`,borderRadius:4,padding:"4px 10px",fontSize:12,color:C.darkBrown,cursor:"pointer"}}>Clear ×</button></div>)}

      {mobile?(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <span style={{fontWeight:500,fontSize:14,color:C.charcoal}}>{cf==="all"?`Courses (${courses.length})`:`${FILTERS[cf].label} (${filtered.length})`}</span>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setShowImport(true)} style={{background:"transparent",border:`1px solid ${C.lightBlue}`,color:C.lightBlue,padding:"7px 10px",borderRadius:4,fontSize:12,fontWeight:500}}>Import</button>
              <button onClick={()=>exportCSV(courses)} style={{background:"transparent",border:`1px solid ${C.lightGreen}`,color:C.lightGreen,padding:"7px 10px",borderRadius:4,fontSize:12,fontWeight:500}}>Export</button>
            </div>
          </div>
          {filtered.length===0?(<div style={{padding:"32px",textAlign:"center",color:C.darkBrown,fontSize:14,background:C.white,border:`1px solid ${C.lightBrown}`,borderRadius:4}}>{courses.length===0?"No courses yet. Tap \"+ New course\" to get started.":"No courses match this filter."}</div>):filtered.map(c=>(<CourseCard key={c.id} c={c} onEdit={()=>openForm(c)} onScope={()=>openScope(c)}/>))}
        </div>
      ):(
        <div style={{background:C.white,border:`1px solid ${C.lightBrown}`,borderRadius:4,overflow:"hidden",marginBottom:20}}>
          <div style={{background:C.darkGreen,padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{color:C.white,fontWeight:500,fontSize:13}}>{cf==="all"?"Course register":FILTERS[cf].label}</span>
            {cf!=="all"&&<span style={{color:"rgba(255,255,255,0.7)",fontSize:12}}>{filtered.length} of {courses.length} courses</span>}
          </div>
          <div style={{overflowX:"auto"}}><table style={{width:"100%",fontSize:13,minWidth:700}}>
            <thead><tr style={{background:C.pink,borderBottom:`1px solid ${C.lightBrown}`}}>{["Course","Faculty / School","Model","Complexity","Go-live","Risk","Completion","Actions"].map(h=>(<th key={h} style={{padding:"8px 12px",textAlign:"left",fontWeight:500,color:C.darkBrown,whiteSpace:"nowrap",fontSize:11,textTransform:"uppercase",letterSpacing:"0.04em"}}>{h}</th>))}</tr></thead>
            <tbody>{filtered.length===0?(<tr><td colSpan={8} style={{padding:"32px",textAlign:"center",color:C.darkBrown,fontSize:13}}>{courses.length===0?"No courses yet. Click \"+ New course\" to get started.":"No courses match this filter."}</td></tr>):filtered.map((c,idx)=>{
              const p=pct(c),rs=riskSty(c.overallRisk);
              return(<tr key={c.id} style={{borderBottom:`1px solid ${C.pink}`,background:idx%2===0?C.white:"#fdfcfb"}}>
                <td style={{padding:"10px 12px"}}><div style={{fontWeight:500}}>{c.courseName||<span style={{color:C.lightBrown}}>Unnamed</span>}</div><div style={{fontSize:11,color:C.darkBrown}}>{c.courseCode}</div></td>
                <td style={{padding:"10px 12px"}}><div style={{fontSize:12}}>{c.faculty?.split(" ").slice(-1)[0]||"—"}</div><div style={{fontSize:11,color:C.darkBrown}}>{c.school?.replace("School of ","")?.slice(0,28)||"—"}</div></td>
                <td style={{padding:"10px 12px",fontSize:12}}>{c.nominatedModel||"—"}</td>
                <td style={{padding:"10px 12px",fontSize:12}}>{c.complexity||"—"}</td>
                <td style={{padding:"10px 12px",fontSize:12,whiteSpace:"nowrap"}}>{c.goLiveGroup?.replace(" — "," ")||"—"}</td>
                <td style={{padding:"10px 12px"}}>{c.overallRisk?<Badge label={c.overallRisk} bg={rs.bg} col={rs.col} br={rs.br}/>:<span style={{color:C.lightBrown}}>—</span>}</td>
                <td style={{padding:"10px 12px"}}><div style={{display:"flex",alignItems:"center",gap:8}}><div style={{flex:1,height:6,background:C.pink,borderRadius:3,minWidth:50}}><div style={{width:`${p}%`,height:"100%",background:p>=80?C.lightGreen:p>=40?C.orange:C.lightBrown,borderRadius:3}}/></div><span style={{fontSize:11,color:C.darkBrown,minWidth:28}}>{p}%</span></div></td>
                <td style={{padding:"10px 12px"}}><div style={{display:"flex",gap:6}}><button onClick={()=>openForm(c)} style={{fontSize:12,padding:"6px 10px",background:C.white,border:`1px solid ${C.orange}`,color:C.orange,borderRadius:4,fontWeight:500,minHeight:34}}>Edit</button><button onClick={()=>openScope(c)} style={{fontSize:12,padding:"6px 10px",background:C.white,border:`1px solid ${C.darkGreen}`,color:C.darkGreen,borderRadius:4,fontWeight:500,minHeight:34}}>Scope doc</button></div></td>
              </tr>);
            })}</tbody>
          </table></div>
        </div>
      )}

      <div style={{paddingTop:12,borderTop:`1px solid ${C.pink}`,fontSize:10,color:C.darkBrown}}>© 2025 Charles Sturt University — TEQSA Provider Identification: PRV12018 (Australian University). CRICOS Provider: 00005F.</div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
